name: RM Read-only Pipeline Tests

on:
  pull_request:
    paths:
      - 'src/**'
      - 'test/**'
      - 'config/**'
      - '.github/workflows/rm-readonly-tests.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Syntax check
        run: |
          find src config test -name '*.js' -print0 | xargs -0 -n1 node --check
      - name: Run tests
        run: node --test test/*.test.js
